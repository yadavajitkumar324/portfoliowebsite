<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cloud File Storage and Sharing Image</title>
  <desc id="desc">Cloud themed visual for mini drive with upload, API, S3 storage, Lambda and Cognito.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081523"/>
      <stop offset="100%" stop-color="#1a3f62"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28537d"/>
      <stop offset="100%" stop-color="#1a3b5c"/>
    </linearGradient>
    <style>
      .h { font-family: Segoe UI, Arial, sans-serif; fill: #ecf7ff; font-weight: 700; font-size: 42px; }
      .p { font-family: Segoe UI, Arial, sans-serif; fill: #c3dcf5; font-size: 20px; }
      .s { font-family: Segoe UI, Arial, sans-serif; fill: #d9edff; font-size: 18px; font-weight: 600; }
      .node { fill: url(#box); stroke: #5f8cb7; stroke-width: 2; rx: 18; }
      .flow { stroke: #8effd1; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 11 15; animation: data 2.1s linear infinite; }
      .pulse { fill: #ffb56d; animation: glow 1.9s ease-in-out infinite; }
      @keyframes data { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -90; } }
      @keyframes glow { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { .flow, .pulse { animation: none; } }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg2)" rx="26"/>

  <g opacity="0.18" fill="#9fd3ff">
    <ellipse cx="140" cy="610" rx="120" ry="58"/>
    <ellipse cx="930" cy="100" rx="110" ry="55"/>
    <ellipse cx="760" cy="620" rx="190" ry="78"/>
  </g>

  <text x="60" y="75" class="h">Cloud File Storage & Sharing</text>
  <text x="60" y="108" class="p">Mini Google Drive style pipeline on AWS services</text>

  <rect x="70" y="250" width="220" height="120" class="node"/>
  <text x="132" y="318" class="s">Users</text>

  <rect x="350" y="250" width="230" height="120" class="node"/>
  <text x="422" y="302" class="s">Frontend</text>
  <text x="402" y="330" class="p" style="font-size:16px">Upload / Download UI</text>

  <rect x="640" y="250" width="240" height="120" class="node"/>
  <text x="710" y="302" class="s">REST API</text>
  <text x="700" y="330" class="p" style="font-size:16px">Node / Python</text>

  <rect x="940" y="140" width="190" height="95" class="node"/>
  <text x="994" y="195" class="s">Cognito Auth</text>

  <rect x="940" y="270" width="190" height="95" class="node"/>
  <text x="1014" y="325" class="s">Amazon S3</text>

  <rect x="940" y="400" width="190" height="95" class="node"/>
  <text x="1003" y="455" class="s">AWS Lambda</text>

  <line x1="290" y1="310" x2="350" y2="310" class="flow"/>
  <line x1="580" y1="310" x2="640" y2="310" class="flow"/>
  <line x1="880" y1="300" x2="940" y2="188" class="flow"/>
  <line x1="880" y1="310" x2="940" y2="317" class="flow"/>
  <line x1="880" y1="320" x2="940" y2="446" class="flow"/>

  <circle cx="350" cy="310" r="8" class="pulse"/>
  <circle cx="640" cy="310" r="8" class="pulse"/>
  <circle cx="940" cy="188" r="8" class="pulse"/>
  <circle cx="940" cy="317" r="8" class="pulse"/>
  <circle cx="940" cy="446" r="8" class="pulse"/>

  <rect x="70" y="510" width="1060" height="120" rx="14" fill="#123251" stroke="#47739a" stroke-width="1.5"/>
  <text x="100" y="555" class="s">Cloud Highlights</text>
  <text x="100" y="587" class="p">Secure authentication, scalable object storage, serverless processing, and cloud-native file management workflow.</text>
</svg>
