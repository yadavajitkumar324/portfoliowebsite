<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Based Student Result Management System</title>
  <desc id="desc">Colorful dashboard style project cover with cloud stack blocks</desc>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b4f"/>
      <stop offset="45%" stop-color="#1f4ec9"/>
      <stop offset="100%" stop-color="#14b0c8"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#d8ebff"/>
    </linearGradient>
    <linearGradient id="stackCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2f7a"/>
      <stop offset="100%" stop-color="#0f8ba3"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg1)"/>
  <circle cx="180" cy="120" r="120" fill="#ff6e7f" opacity="0.28"/>
