<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Drive Storage System</title>
  <desc id="desc">Architecture diagram showing mini Google Drive with users, frontend, API, authentication, storage and processing.</desc>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; fill: #e0f2f1; font-weight: bold; font-size: 40px; }
      .subtitle { font-family: Arial, sans-serif; fill: #b2dfdb; font-size: 18px; }
      .label { font-family: Arial, sans-serif; fill: #ffffff; font-weight: bold; font-size: 18px; }
      .info { font-family: Arial, sans-serif; fill: #ffffff; font-size: 14px; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#1a3d5e"/>

  <text x="60" y="70" class="title">Mini Google Drive - Cloud Storage</text>
  <text x="60" y="100" class="subtitle">User uploads → AWS S3 with Cognito auth → Lambda processing</text>

  <g>
    <rect x="80" y="180" width="160" height="100" rx="8" fill="#4fc3f7" stroke="#ffffff" stroke-width="2"/>
    <circle cx="130" cy="205" r="10" fill="#ffffff" opacity="0.8"/>
    <circle cx="150" cy="205" r="10" fill="#ffffff" opacity="0.8"/>
    <rect x="105" y="225" width="50" height="20" rx="3" fill="#ffffff" opacity="0.6"/>
    <text x="160" y="225" class="label" text-anchor="middle">Users</text>
    <text x="160" y="245" class="info" text-anchor="middle">Upload Files</text>

    <rect x="320" y="180" width="160" height="100" rx="8" fill="#81c784" stroke="#ffffff" stroke-width="2"/>
    <path d="M385 195 L385 215 M375 205 L395 205" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="400" y="225" class="label" text-anchor="middle">Frontend</text>
    <text x="400" y="245" class="info" text-anchor="middle">React App</text>

    <rect x="560" y="180" width="160" height="100" rx="8" fill="#ce93d8" stroke="#ffffff" stroke-width="2"/>
    <path d="M630 195 L615 215 L630 215 L645 215" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="640" y="225" class="label" text-anchor="middle">REST API</text>
    <text x="640" y="245" class="info" text-anchor="middle">Node.js Server</text>

    <rect x="800" y="140" width="140" height="90" rx="8" fill="#ffb74d" stroke="#ffffff" stroke-width="2"/>
    <path d="M860 155 L845 170 L860 170 L875 170 M860 165 L860 175" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="870" y="185" class="label" text-anchor="middle">Cognito</text>
    <text x="870" y="205" class="info" text-anchor="middle" font-size="12">Auth</text>

    <rect x="800" y="270" width="140" height="90" rx="8" fill="#f48fb1" stroke="#ffffff" stroke-width="2"/>
    <rect x="835" y="285" width="30" height="40" fill="#ffffff" opacity="0.7" rx="2"/>
    <circle cx="850" cy="305" r="3" fill="#f48fb1"/>
    <text x="870" y="315" class="label" text-anchor="middle">Amazon S3</text>
    <text x="870" y="335" class="info" text-anchor="middle" font-size="12">Storage</text>

    <rect x="800" y="400" width="140" height="90" rx="8" fill="#81c784" stroke="#ffffff" stroke-width="2"/>
    <path d="M860 415 L855 435 L865 435 M860 440 L860 455" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="870" y="445" class="label" text-anchor="middle">Lambda</text>
    <text x="870" y="465" class="info" text-anchor="middle" font-size="12">Process</text>
  </g>

  <line x1="240" y1="230" x2="320" y2="230" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <polygon points="320,230 310,225 310,235" fill="#4fc3f7"/>

  <line x1="480" y1="230" x2="560" y2="230" stroke="#81c784" stroke-width="3" stroke-linecap="round"/>
  <polygon points="560,230 550,225 550,235" fill="#81c784"/>

  <line x1="720" y1="210" x2="800" y2="185" stroke="#ce93d8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="800,185 794,175 803,180" fill="#ce93d8"/>

  <line x1="720" y1="230" x2="800" y2="315" stroke="#ce93d8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="800,315 794,310 803,320" fill="#ce93d8"/>

  <line x1="720" y1="250" x2="800" y2="445" stroke="#ce93d8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="800,445 794,435 803,445" fill="#ce93d8"/>

  <rect x="80" y="550" width="1040" height="130" rx="8" fill="#0d47a1" stroke="#4fc3f7" stroke-width="2"/>
  <text x="100" y="590" class="label">Key Architecture Components</text>
  <text x="100" y="620" class="subtitle">Cognito handles user authentication and authorization • Users upload files through React frontend • API processes requests and manages S3 operations • Lambda functions handle background tasks and notifications • Files stored securely in Amazon S3 with versioning enabled</text>
</svg>
